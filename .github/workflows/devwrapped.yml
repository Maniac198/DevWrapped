name: DevWrapped

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Single year (ignored if 'years' is set). Defaults to last year."
        required: false
        default: ""
      years:
        description: "Comma-separated years to publish in one run (e.g. '2022,2023,2024'). Prior years on Pages are preserved automatically."
        required: false
        default: ""
      owner:
        description: "GitHub handle (defaults to repo owner)"
        required: false
        default: ""
      is-org:
        description: "Set to 'true' if the owner is an org"
        required: false
        default: "false"
      preserve-existing:
        description: "Hydrate ./public from the live Pages site before staging new years. Set to 'false' to wipe and restart."
        required: false
        default: "true"
  schedule:
    # First day of every year, 00:15 UTC.
    - cron: "15 0 1 1 *"

# Don't pile up concurrent Pages deploys; only the latest one matters.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build DevWrapped report
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # A local composite action (uses: ./...) needs the repo checked out
      # BEFORE it can be resolved — the inner checkout in the composite is
      # too late. This is the fix for:
      #   "Can't find 'action.yml' under '.github/actions/devwrapped'"
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run DevWrapped
        uses: ./.github/actions/devwrapped
        with:
          year: ${{ github.event.inputs.year }}
          years: ${{ github.event.inputs.years }}
          owner: ${{ github.event.inputs.owner }}
          is-org: ${{ github.event.inputs.is-org || 'false' }}
          output: both
          prepare-pages: "true"
          preserve-existing: ${{ github.event.inputs.preserve-existing || 'true' }}
          upload-pages-artifact: "true"

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
