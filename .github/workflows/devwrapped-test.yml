name: DevWrapped Test

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Year to test"
        required: false
        default: "2024"
      owner:
        description: "GitHub handle"
        required: false
        default: ""

# Don't pile up concurrent test deploys; only the latest one matters.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build (test)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run DevWrapped (no Pages upload)
        uses: ./.github/actions/devwrapped
        with:
          year: ${{ github.event.inputs.year }}
          owner: ${{ github.event.inputs.owner }}
          output: html
          prepare-pages: "true"
          # Test runs don't deploy, they just verify the build surface.
          upload-pages-artifact: "false"
