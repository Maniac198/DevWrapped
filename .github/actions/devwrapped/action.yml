name: "DevWrapped"
description: "Generate Spotify-Wrapped-style year-end developer stats and stage them for GitHub Pages"

inputs:
  year:
    description: "Single year to generate (defaults to last year). Ignored when `years` is set."
    required: false
    default: ""
  years:
    description: "Comma-separated list of years to generate in one run (e.g. '2022,2023,2024')."
    required: false
    default: ""
  owner:
    description: "GitHub username or org. Defaults to the workflow actor."
    required: false
    default: ""
  is-org:
    description: "Set to 'true' if owner is an organization."
    required: false
    default: "false"
  output:
    description: "Output format per year: json, html, or both."
    required: false
    default: "both"
  prepare-pages:
    description: "Set to 'true' to stage output under ./public/<year> and rebuild the multi-year index."
    required: false
    default: "true"
  preserve-existing:
    description: "Before generating, download the current live Pages site into ./public/ so previously published years are preserved."
    required: false
    default: "true"
  pages-url:
    description: "Override the live Pages URL used for preservation. Defaults to https://<owner>.github.io/<repo>."
    required: false
    default: ""
  upload-pages-artifact:
    description: "Set to 'true' to upload ./public as a Pages artifact (for use with actions/deploy-pages)."
    required: false
    default: "true"
  devwrapped-ref:
    description: "Git ref to install DevWrapped from when the caller repo isn't the DevWrapped source. Used as fallback only."
    required: false
    default: "main"
  github-token:
    description: "Token used to call the GitHub API. Defaults to github.token."
    required: false
    default: ${{ github.token }}

outputs:
  years:
    description: "Space-separated list of years actually generated."
    value: ${{ steps.params.outputs.years }}
  owner:
    description: "The GitHub handle the report was generated for."
    value: ${{ steps.params.outputs.owner }}
  public-dir:
    description: "Directory containing the staged Pages content."
    value: ./public

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install DevWrapped
      shell: bash
      run: |
        set -euo pipefail
        # Prefer installing from a local pyproject (when the caller is the
        # DevWrapped source repo); otherwise install from the requested git
        # ref so this Action is usable from any caller repository.
        if [ -f pyproject.toml ] && grep -q 'name *= *"devwrapped"' pyproject.toml; then
          echo "Installing DevWrapped from local source (.[share])"
          python -m pip install --upgrade pip
          pip install '.[share]'
        else
          REF="${{ inputs.devwrapped-ref }}"
          echo "Installing DevWrapped from git ref: $REF"
          python -m pip install --upgrade pip
          pip install "devwrapped[share] @ git+https://github.com/Maniac198/devwrapped.git@$REF"
        fi
        devwrapped version

    - name: Resolve parameters
      id: params
      shell: bash
      run: |
        set -euo pipefail

        # Resolve the list of years to generate. Precedence:
        #   1. `years` input (comma-separated)
        #   2. `year` input (single year)
        #   3. Default: last year (UTC-now - 1)
        RAW_YEARS="${{ inputs.years }}"
        SINGLE_YEAR="${{ inputs.year }}"
        YEARS=""

        if [ -n "$RAW_YEARS" ]; then
          # Strip spaces, split on commas, validate each token is 4 digits.
          CLEANED=$(echo "$RAW_YEARS" | tr -d '[:space:]')
          IFS=',' read -ra PARTS <<< "$CLEANED"
          for P in "${PARTS[@]}"; do
            if [[ "$P" =~ ^[0-9]{4}$ ]]; then
              YEARS+="$P "
            else
              echo "::warning::Ignoring invalid year token: '$P'"
            fi
          done
        elif [ -n "$SINGLE_YEAR" ]; then
          if [[ "$SINGLE_YEAR" =~ ^[0-9]{4}$ ]]; then
            YEARS="$SINGLE_YEAR"
          else
            echo "::error::Invalid year: '$SINGLE_YEAR' (expected 4 digits)"
            exit 1
          fi
        else
          YEARS=$(( $(date -u +%Y) - 1 ))
        fi

        # Trim trailing whitespace.
        YEARS=$(echo "$YEARS" | xargs)
        if [ -z "$YEARS" ]; then
          echo "::error::No valid years to generate."
          exit 1
        fi

        OWNER="${{ inputs.owner }}"
        if [ -z "$OWNER" ]; then
          OWNER="${{ github.actor }}"
        fi

        echo "Resolved years: $YEARS"
        echo "Resolved owner: $OWNER"
        echo "years=$YEARS" >> "$GITHUB_OUTPUT"
        echo "owner=$OWNER" >> "$GITHUB_OUTPUT"

    - name: Hydrate ./public from live Pages site
      if: ${{ inputs.prepare-pages == 'true' && inputs.preserve-existing == 'true' }}
      shell: bash
      env:
        PAGES_URL_OVERRIDE: ${{ inputs.pages-url }}
      run: |
        set -euo pipefail
        mkdir -p public

        # Derive the Pages URL unless explicitly overridden. GitHub Pages is
        # case-insensitive for the owner segment, so we can safely use the
        # repo owner as-is.
        if [ -n "$PAGES_URL_OVERRIDE" ]; then
          BASE="${PAGES_URL_OVERRIDE%/}"
        else
          BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
        fi

        echo "Hydrating from: $BASE"

        MANIFEST_HTTP=$(curl -s -o /tmp/years.json -w '%{http_code}' "$BASE/years.json" || echo 000)
        if [ "$MANIFEST_HTTP" != "200" ]; then
          echo "No existing years.json at $BASE/years.json (HTTP $MANIFEST_HTTP). Starting fresh."
          exit 0
        fi

        # Extract year values with python (always available here) to avoid jq.
        # Kept as a single-line invocation so YAML literal-block rules aren't
        # disturbed by heredoc content.
        YEARS_TO_FETCH=$(python -c 'import json; d=json.load(open("/tmp/years.json"));print("\n".join(str(e["year"]) for e in d.get("years",[]) if isinstance(e.get("year"), int) and 1970 <= e["year"] <= 9999))' || true)

        if [ -z "$YEARS_TO_FETCH" ]; then
          echo "Manifest found but contains no years. Starting fresh."
          exit 0
        fi

        for Y in $YEARS_TO_FETCH; do
          echo "  ↓ $Y"
          mkdir -p "public/$Y"
          for FILE in index.html wrapped.json og.png; do
            URL="$BASE/$Y/$FILE"
            # --fail: don't create output on 4xx/5xx; -o to a tmpfile first.
            if curl -s --fail -o "public/$Y/$FILE.tmp" "$URL"; then
              mv "public/$Y/$FILE.tmp" "public/$Y/$FILE"
            else
              rm -f "public/$Y/$FILE.tmp"
              echo "    (no $FILE for $Y)"
            fi
          done
        done

        echo "Hydrated public/ with years: $YEARS_TO_FETCH"

    - name: Generate DevWrapped for each year
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        DEVWRAPPED_LOG_JSON: "1"
      run: |
        set -euo pipefail

        OWNER="${{ steps.params.outputs.owner }}"
        ORG_FLAG=""
        if [ "${{ inputs.is-org }}" = "true" ]; then
          ORG_FLAG="--org"
        fi
        OUTPUT_MODE="${{ inputs.output }}"

        for YEAR in ${{ steps.params.outputs.years }}; do
          echo "::group::📊 Generating DevWrapped for $YEAR"

          export DEVWRAPPED_SHARE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${YEAR}/"

          # Clean up any prior-run artefacts in the working dir.
          rm -f wrapped.html wrapped.json wrapped-og.png

          case "$OUTPUT_MODE" in
            json)
              devwrapped generate --provider github --owner "$OWNER" --year "$YEAR" $ORG_FLAG --output wrapped.json --no-og
              ;;
            html)
              devwrapped generate --provider github --owner "$OWNER" --year "$YEAR" $ORG_FLAG --output wrapped.html
              ;;
            both|*)
              # HTML first so the JSON can embed the same heatmap.
              devwrapped generate --provider github --owner "$OWNER" --year "$YEAR" $ORG_FLAG --output wrapped.html
              devwrapped generate --provider github --owner "$OWNER" --year "$YEAR" $ORG_FLAG --output wrapped.json --no-og
              ;;
          esac

          if [ "${{ inputs.prepare-pages }}" = "true" ]; then
            mkdir -p "public/$YEAR"
            [ -f wrapped.html ] && mv wrapped.html "public/$YEAR/index.html"
            [ -f wrapped.json ] && mv wrapped.json "public/$YEAR/wrapped.json"
            [ -f wrapped-og.png ] && mv wrapped-og.png "public/$YEAR/og.png"
          fi

          echo "::endgroup::"
        done

    - name: Finalize Pages layout
      if: ${{ inputs.prepare-pages == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        devwrapped build-index --public-dir public
        # Jekyll would otherwise skip files/dirs that start with an underscore
        # or a dot; opt out explicitly.
        touch public/.nojekyll

        echo "--- public/ contents ---"
        find public -maxdepth 3 -type f | sort

    - name: Upload GitHub Pages artifact
      if: ${{ inputs.prepare-pages == 'true' && inputs.upload-pages-artifact == 'true' }}
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./public

    - name: Upload workflow artifacts (per year)
      uses: actions/upload-artifact@v4
      with:
        name: devwrapped-${{ steps.params.outputs.years }}
        path: |
          public/**/index.html
          public/**/wrapped.json
          public/**/og.png
        if-no-files-found: ignore
